<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>colcount / colspan — input + icon buttons</title>
  <style>

@layer reset, default, skin, grid;

@layer reset {
  *, *::before, *::after { box-sizing: border-box; }
  body, h1, h2, h3, h4, p { margin: 0; }
  button, input, textarea, select { font: inherit; color: inherit; }
}

:root {
  color-scheme: light dark;

  --accent-hue: 250;
  --accent-chroma: 0.14;
  --surface-hue: 250;
  --jump: 0.07;

  --accent:       oklch(58% var(--accent-chroma) var(--accent-hue));
  --accent-up:    oklch(calc(58% + var(--jump)) var(--accent-chroma) var(--accent-hue));
  --accent-dn:    oklch(calc(58% - var(--jump)) var(--accent-chroma) var(--accent-hue));

  --neutral:      light-dark(oklch(96% 0.01 var(--surface-hue)), oklch(16% 0.01 var(--surface-hue)));
  --neutral-mute: light-dark(oklch(92% 0.01 var(--surface-hue)), oklch(20% 0.01 var(--surface-hue)));
  --neutral-edge: light-dark(oklch(85% 0.02 var(--surface-hue)), oklch(30% 0.02 var(--surface-hue)));

  --text:      light-dark(oklch(20% 0.01 var(--surface-hue)), oklch(92% 0.01 var(--surface-hue)));
  --text-mute: light-dark(oklch(40% 0.01 var(--surface-hue)), oklch(72% 0.01 var(--surface-hue)));

  --text-on-accent: oklch(98% 0.01 var(--accent-hue));

  --0:  0;
  --xs: clamp(0.2rem, 0.4vw, 0.4rem);
  --s:  clamp(0.4rem, 1vw, 0.8rem);
  --m:  clamp(0.8rem, 2vw, 1.6rem);
  --l:  clamp(1.2rem, 4vw, 2.4rem);

  --ease: cubic-bezier(0.25, 0, 0.3, 1);
}

@layer default {
  body {
    font-family: system-ui, sans-serif;
    font-size: var(--m);
    line-height: 1.5;
    color: var(--text);
    background: var(--neutral);
    padding: var(--m);
    display: grid;
    gap: var(--l);
  }

  section {
    background: var(--neutral-mute);
    border: 1px solid var(--neutral-edge);
    border-radius: var(--s);
    padding: var(--s);
    display: grid;
    gap: var(--s);
  }

  small { color: var(--text-mute); }

  button, input {
    border: 1px solid var(--neutral-edge);
    border-radius: var(--xs);
    background: var(--neutral);
    color: var(--text);
    padding: var(--xs) var(--s);
    transition: border-color 0.15s var(--ease),
                background 0.15s var(--ease);
  }

  button {
    cursor: pointer;
    font-weight: 600;
    background: var(--neutral-mute);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--xs);
  }
  button:hover:not(:disabled) { background: var(--neutral-edge); }
  button:active:not(:disabled) { scale: 0.98; }

  svg {
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
}

@layer skin {
  [data-skin~="emphasis"] {
    background: var(--accent);
    color: var(--text-on-accent);
    border-color: var(--accent);
  }
  [data-skin~="emphasis"]:hover:not(:disabled) {
    background: var(--accent-dn);
    border-color: var(--accent-dn);
  }

  [data-skin~="square"] {
    aspect-ratio: 1;
    padding: var(--xs);
  }
}

@layer grid {
  [data-colcount] {
    display: grid;
    gap: var(--xs);
    align-items: center;
  }
  [data-colcount="6"]  { grid-template-columns: repeat(6, 1fr); }
  [data-colcount="8"]  { grid-template-columns: repeat(8, 1fr); }
  [data-colcount="10"] { grid-template-columns: repeat(10, 1fr); }
  [data-colcount="12"] { grid-template-columns: repeat(12, 1fr); }

  [data-colspan="1"]  { grid-column: span 1; }
  [data-colspan="4"]  { grid-column: span 4; }
  [data-colspan="6"]  { grid-column: span 6; }
  [data-colspan="8"]  { grid-column: span 8; }
  [data-colspan="10"] { grid-column: span 10; }
}

  </style>
</head>
<body>

  <!-- 6-col: input 4 + btn 1 + btn 1 -->
  <section>
    <small>6-column row — input×4 + icon×1 + icon×1</small>
    <div data-colcount="6">
      <input type="text" placeholder="Search…" data-colspan="4">
      <button data-skin="square" aria-label="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button data-skin="emphasis square" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </section>

  <!-- 8-col: input 6 + btn 1 + btn 1 -->
  <section>
    <small>8-column row — input×6 + icon×1 + icon×1</small>
    <div data-colcount="8">
      <input type="text" placeholder="Search…" data-colspan="6">
      <button data-skin="square" aria-label="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button data-skin="emphasis square" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </section>

  <!-- 10-col: input 8 + btn 1 + btn 1 -->
  <section>
    <small>10-column row — input×8 + icon×1 + icon×1</small>
    <div data-colcount="10">
      <input type="text" placeholder="Search…" data-colspan="8">
      <button data-skin="square" aria-label="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button data-skin="emphasis square" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </section>

  <!-- 12-col: input 10 + btn 1 + btn 1 -->
  <section>
    <small>12-column row — input×10 + icon×1 + icon×1</small>
    <div data-colcount="12">
      <input type="text" placeholder="Search…" data-colspan="10">
      <button data-skin="square" aria-label="Clear">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <button data-skin="emphasis square" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>
  </section>

</body>
</html>
